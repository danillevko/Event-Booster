<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Booster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <header class="header">
        <div class="header-title-wrapper">
            <a href="./index.html" class="logo-link"><img src="./incons/logo.svg" alt="logo" class="logo"></a>
            <h1 class="title">find best events<br>around the world</h1>
        </div>
        <div class="input-header-wrapper">
            <form action="" id="search-form">
                <input type="text" class="search-input search" placeholder="Start searching">
                <select class="search-input country" id="choose-country" placeholder="Choose country">
                    <option value="">Choose country</option>
                    <option value="US">United States</option>
                    <option value="GB">United Kingdom</option>
                    <option value="DE">Germany</option>
                    <option value="FR">France</option>
                    <option value="ES">Spain</option>
                    <option value="UA">Ukraine</option>
                </select>
            </form>
        </div>
    </header>
    <div class="a">
        <div class="container">
            <main class="main">
                <div class="event-container"></div>
                <div class="pagination"></div>
            </main>
            <footer class="footer">
                <h3 class="rights">© 2021 | All Rights Reserved | Developed with ♥ by GoIT Students</h3>
            </footer>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/handlebars@latest/dist/handlebars.min.js"></script>
    <script src="./index.js"></script>
</body>

</html>
